[toolchain]

[features]
resolution = true
skip-lint = false

[programs.localnet]
unsys_staking = "8fQT7WjAw2BLYJcbTPYxLciPmUgh5GS4Jj2Vo1uhoK2q"

[programs.devnet]
unsys_staking = "GSxEFVkssh6trQ97WZBsMGs1iahdJ6Z2fSPjQ617nKLN"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""

[test]
startup_wait = 10000
shutdown_wait = 2000
# [Issue 12] For localnet testing, non-upgradeable is fine.
# For testnet/devnet, set upgradeable = true to allow iterative fixes.
# For mainnet, keep upgradeable = true initially with a multisig upgrade authority,
# then freeze (set authority to None) once the program is battle-tested.
upgradeable = true
